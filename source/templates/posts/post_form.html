{% extends 'partial/base.html' %}

{% block title %}Новая публикация — Instagram{% endblock %}

{% block content %}
<div class="d-flex justify-content-center py-5">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">
            <h1 class="fs-4 mb-4">Новая публикация</h1>

            <form method="post" enctype="multipart/form-data" novalidate>
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label small fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-primary w-100">Опубликовать</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
